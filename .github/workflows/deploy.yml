name: Deploy to Nomad

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Nomad CLI
        uses: hashicorp/setup-nomad@v1.0.0
        with:
          version: '1.6.0'
      
      - name: Deploy new-api to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          nomad job run infrastructure/nomad/new-api.nomad.hcl
      
      - name: Deploy postgres to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          nomad job run infrastructure/nomad/postgres.nomad.hcl